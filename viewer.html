<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
            --accent: #e8e0c8; --muted: #555; --text: #ccc;
        }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; height: 100vh; display: flex; flex-direction: column; }
        nav { border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-shrink: 0; }
        nav a { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); text-decoration: none; }
        nav a:hover { color: var(--accent); }
        nav .filename { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent); }
        #viewer { flex: 1; overflow: auto; }
        #viewer iframe { width: 100%; height: 100%; border: none; display: block; }
        #docx-container { max-width: 860px; margin: 0 auto; padding: 3rem 2rem; background: #fff; min-height: 100%; color: #111; }
        #image-container { display: flex; align-items: center; justify-content: center; height: 100%; padding: 2rem; }
        #image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        #fallback { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--muted); }
        #fallback a { color: var(--accent); }
    </style>
</head>
<body>
<nav>
    <a href="" onclick="window.close()">← close</a>
    <span class="filename" id="nav-filename"></span>
    <a id="download-link" href="#">download</a>
</nav>
<div id="viewer"></div>

<script src="/jszip.min.js"></script>
<script type="module" src="docx-preview.min.js"></script>
<script>
    console.log("globals with 'docx':", Object.keys(window).filter(k => k.toLowerCase().includes("docx")));
</script>
<script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");

    if (!file) {
        document.getElementById("viewer").innerHTML = '<div id="fallback"><span>no file specified</span></div>';
    } else {
        const filename = file.split("/").pop();
        const ext = filename.split(".").pop().toLowerCase();
        document.title = filename;
        document.getElementById("nav-filename").textContent = filename;
        document.getElementById("download-link").href = file;
        document.getElementById("download-link").download = filename;

        const viewer = document.getElementById("viewer");

        if (ext === "pdf") {
            viewer.innerHTML = `<iframe src="${file}"></iframe>`;

        } else if (ext === "docx") {
            const container = document.createElement("div");
            container.id = "docx-container";
            viewer.appendChild(container);
            fetch(file)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.arrayBuffer();
                })
                .then(buf => docx.renderAsync(buf, container))
                .catch(err => {
                    console.error(err);
                    container.innerHTML = `<div id="fallback"><span>failed: ${err.message}</span><a href="${file}">download instead</a></div>`;
                });

        } else if (["png","jpg","jpeg","gif","webp","svg"].includes(ext)) {
            const wrap = document.createElement("div");
            wrap.id = "image-container";
            wrap.innerHTML = `<img src="${file}" alt="${filename}">`;
            viewer.appendChild(wrap);

        } else if (["txt","md","csv","json","xml","html","js","css","py"].includes(ext)) {
            fetch(file)
                .then(r => r.text())
                .then(text => {
                    const pre = document.createElement("pre");
                    pre.style.cssText = "padding:2rem;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;";
                    pre.textContent = text;
                    viewer.appendChild(pre);
                });

        } else {
            viewer.innerHTML = `<div id="fallback"><span>no preview available for .${ext}</span><a href="${file}">download ${filename}</a></div>`;
        }
    }
</script>
</body>
</html>
